<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ subject }}</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f4f4f5;
      color: #18181b;
      line-height: 1.6;
    }
    .wrapper {
      max-width: 600px;
      margin: 32px auto;
      background: #ffffff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .header {
      background: #18181b;
      padding: 28px 36px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .header-logo {
      width: 36px; height: 36px;
      background: #f59e0b;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
    }
    .header-logo svg { width: 20px; height: 20px; }
    .header-title { color: #ffffff; font-size: 16px; font-weight: 700; }
    .header-sub { color: rgba(255,255,255,0.4); font-size: 12px; margin-top: 2px; }
    .body { padding: 36px; }
    .greeting { font-size: 22px; font-weight: 700; color: #18181b; margin-bottom: 8px; }
    .subtitle { font-size: 14px; color: #71717a; margin-bottom: 28px; }
    .card {
      background: #f9f9f9;
      border: 1px solid #e4e4e7;
      border-radius: 12px;
      padding: 20px 24px;
      margin-bottom: 20px;
    }
    .card-label { font-size: 11px; font-weight: 600; color: #a1a1aa; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 4px; }
    .card-value { font-size: 15px; font-weight: 600; color: #18181b; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 20px; }
    .info-item { background: #f9f9f9; border: 1px solid #e4e4e7; border-radius: 10px; padding: 14px 16px; }
    .badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 9999px;
      font-size: 12px;
      font-weight: 600;
    }
    .badge-amber  { background: #fef3c7; color: #92400e; }
    .badge-green  { background: #dcfce7; color: #14532d; }
    .badge-blue   { background: #dbeafe; color: #1e3a8a; }
    .badge-red    { background: #fee2e2; color: #7f1d1d; }
    .btn {
      display: inline-block;
      padding: 13px 28px;
      background: #f59e0b;
      color: #000000;
      font-size: 14px;
      font-weight: 700;
      text-decoration: none;
      border-radius: 10px;
      margin-top: 24px;
    }
    .divider { height: 1px; background: #e4e4e7; margin: 24px 0; }
    .footer {
      background: #f9f9f9;
      border-top: 1px solid #e4e4e7;
      padding: 20px 36px;
      text-align: center;
    }
    .footer p { font-size: 12px; color: #a1a1aa; margin-bottom: 4px; }
    .code-box {
      background: #18181b;
      border-radius: 12px;
      padding: 24px;
      text-align: center;
      margin: 20px 0;
    }
    .code-text {
      font-family: 'Courier New', monospace;
      font-size: 32px;
      font-weight: 900;
      color: #f59e0b;
      letter-spacing: 0.15em;
    }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <div class="header-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="#000" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/>
        </svg>
      </div>
      <div>
        <div class="header-title">Auto Garden Pvt. Ltd.</div>
        <div class="header-sub">Bharatpur, Chitwan, Nepal</div>
      </div>
    </div>
    <div class="body">
      {% block content %}{% endblock %}
    </div>
    <div class="footer">
      <p>Auto Garden Pvt. Ltd. · Bharatpur, Chitwan, Nepal</p>
      <p>This is an automated notification. Please do not reply to this email.</p>
    </div>
  </div>
</body>
</html>
